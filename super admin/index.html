<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Super Admin | Warana University</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="wu-login-page">
    <header class="wu-header-card wu-login-header-card mx-3 mx-md-4 mt-3 mb-0">
      <div class="wu-login-header-inner">
        <div class="wu-login-header-logo-wrap">
          <img
            src="assets/img/university-logo.png"
            alt="Warana University"
            class="wu-login-header-logo"
            width="200"
            height="88"
          />
        </div>
        <div class="wu-login-header-center">
          <p class="wu-tagline mb-1">॥ विद्या सर्वस्य भूषणम् ॥</p>
          <p class="wu-org-line mb-1">SHREE WARANA VIBHAG SHIKSHAN MANDAL'S</p>
          <h1 class="wu-header-title mb-1 wu-login-header-title">
            Warana University, Warananagar
          </h1>
          <span class="wu-badge-uni">(A State Public University)</span>
        </div>
        <div class="wu-login-header-aside">
          <div class="wu-login-portrait-frame">
            <img
              class="wu-login-portrait-img"
              src="assets/img/founder.png"
              alt="Founder"
              width="72"
              height="72"
            />
          </div>
        </div>
      </div>
    </header>

    <main class="wu-login-main">
    <div class="wu-login-card">
      <h2 class="mb-1">Welcome Back</h2>
      <p class="text-muted mb-4">Login to your university account.</p>
      <form action="dashboard.html" method="get">
        <div class="mb-3">
          <label class="form-label fw-semibold" for="loginUser">Username / Email</label>
          <input
            type="text"
            class="form-control"
            id="loginUser"
            placeholder="Enter your username"
            autocomplete="username"
          />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold" for="loginPass">Password</label>
          <input
            type="password"
            class="form-control"
            id="loginPass"
            placeholder="Enter your password"
            autocomplete="current-password"
          />
        </div>
        <div class="d-flex justify-content-between align-items-center mb-4 small">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remember" />
            <label class="form-check-label" for="remember">Remember me</label>
          </div>
          <a href="#" class="text-decoration-none" style="color: var(--wu-secondary)">Forgot Password?</a>
        </div>
        <button type="submit" class="btn btn-wu-primary w-100 py-2">Log In</button>
      </form>
      <p class="text-center text-muted small mt-4 mb-0">
        Don't have an account? <a href="#" class="fw-semibold text-decoration-none" style="color: var(--wu-primary)">Contact Administration</a>
      </p>
    </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
